name: Weekly Research Digest

on:
  schedule:
    # Every Monday at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install google-generativeai requests feedparser

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd pipeline
          bash run.sh

      - name: Check for new posts
        id: git-check
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No new posts to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "Pain Rewired Bot"
          git config user.email "bot@painrewired.vercel.app"
          git commit -m "Auto: add weekly research digest posts"
          git push
